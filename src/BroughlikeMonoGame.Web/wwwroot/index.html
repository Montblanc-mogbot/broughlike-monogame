<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Broughlike MonoGame</title>
    <base href="./" />
    <link href="BroughlikeMonoGame.Web.styles.css" rel="stylesheet" />
</head>
<body>
    <div id="browserDebug" style="position:fixed;top:8px;left:8px;z-index:9999;padding:6px 8px;background:rgba(0,0,0,0.75);color:#fff;font:12px monospace;white-space:pre;pointer-events:none;">browser: init</div>
    <div id="app">
        <div style="display:grid;place-items:center;width:100vw;height:100vh;background:#361c5c;color:#fff;font-family:system-ui,sans-serif;">
            Loading Broughlike MonoGame…
        </div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">x</a>
    </div>

    <script src="_framework/blazor.webassembly.js" autostart="false"></script>
    <script type="module">
        import { BrotliDecode } from './js/decode.min.js';
        window.BrotliDecode = BrotliDecode;
        const enableBrotliDecompression = false;

        Blazor.start({
            loadBootResource: function (type, name, defaultUri) {
                if (enableBrotliDecompression === true && type !== 'dotnetjs' && location.hostname !== 'localhost') {
                    return (async function () {
                        const response = await fetch(defaultUri + '.br', { cache: 'no-cache' });
                        if (!response.ok) throw new Error(response.statusText);
                        const originalResponseBuffer = await response.arrayBuffer();
                        const originalResponseArray = new Int8Array(originalResponseBuffer);
                        const contentType = type === 'dotnetwasm' ? 'application/wasm' : 'application/octet-stream';
                        const decompressedResponseArray = BrotliDecode(originalResponseArray);
                        return new Response(decompressedResponseArray, { headers: { 'content-type': contentType } });
                    })();
                }

                return undefined;
            }
        });
    </script>

    <script src="_content/nkast.Wasm.JSInterop/js/JSObject.8.0.11.js"></script>
    <script src="_content/nkast.Wasm.Dom/js/Window.8.0.11.js"></script>
    <script src="_content/nkast.Wasm.Dom/js/Document.8.0.11.js"></script>
    <script src="_content/nkast.Wasm.Dom/js/Navigator.8.0.11.js"></script>
    <script src="_content/nkast.Wasm.Dom/js/Gamepad.8.0.11.js"></script>
    <script src="_content/nkast.Wasm.Dom/js/Media.8.0.11.js"></script>
    <script src="_content/nkast.Wasm.XHR/js/XHR.8.0.11.js"></script>
    <script src="_content/nkast.Wasm.Canvas/js/Canvas.8.0.11.js"></script>
    <script src="_content/nkast.Wasm.Canvas/js/CanvasGLContext.8.0.11.js"></script>
    <script src="_content/nkast.Wasm.Audio/js/Audio.8.0.11.js"></script>

    <script>
        const browserInputDebug = {
            keydown: 'none',
            keyup: 'none',
            queued: 'none',
            focus: 'unknown',
            active: 'unknown'
        };

        function renderBrowserDebug() {
            const el = document.getElementById('browserDebug');
            if (!el) return;
            el.textContent = `browser keydown=${browserInputDebug.keydown}\nkeyup=${browserInputDebug.keyup}\nqueued=${browserInputDebug.queued}\nfocus=${browserInputDebug.focus}\nactive=${browserInputDebug.active}`;
        }

        function updateActiveElement() {
            const active = document.activeElement;
            browserInputDebug.active = active ? `${active.tagName.toLowerCase()}#${active.id || '(no-id)'}` : 'none';
            renderBrowserDebug();
        }

        function tickJS() {
            updateActiveElement();
            window.theInstance.invokeMethod('TickDotNet');
            window.requestAnimationFrame(tickJS);
        }

        window.initRenderJS = (instance) => {
            window.theInstance = instance;
            const canvas = document.getElementById('theCanvas');
            canvas.addEventListener('contextmenu', e => e.preventDefault());
            canvas.setAttribute('tabindex', '0');
            canvas.focus();
            browserInputDebug.focus = 'focused';
            updateActiveElement();
            window.requestAnimationFrame(tickJS);
        };

        window.addEventListener('focus', function() {
            browserInputDebug.focus = 'focused';
            updateActiveElement();
        });

        window.addEventListener('blur', function() {
            browserInputDebug.focus = 'blurred';
            updateActiveElement();
        });

        window.addEventListener('keydown', function(event) {
            browserInputDebug.keydown = event.key;
            if (window.theInstance) {
                window.theInstance.invokeMethod('QueueKeyDotNet', event.key);
                browserInputDebug.queued = event.key;
            }
            updateActiveElement();
            if ([32, 37, 38, 39, 40].indexOf(event.keyCode) > -1) event.preventDefault();
        });

        window.addEventListener('keyup', function(event) {
            browserInputDebug.keyup = event.key;
            updateActiveElement();
        });

        window.addEventListener('wheel', function(event) {
            event.preventDefault();
        }, { passive: false });

        renderBrowserDebug();
    </script>
</body>
</html>
