name: deploy-pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore web host
        run: dotnet restore src/BroughlikeMonoGame.Web/BroughlikeMonoGame.Web.csproj

      - name: Publish web build
        run: dotnet publish src/BroughlikeMonoGame.Web/BroughlikeMonoGame.Web.csproj -c Release

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: src/BroughlikeMonoGame.Web/bin/Release/net8.0-browser/publish/wwwroot

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
